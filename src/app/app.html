@if (mostrarLayout()) {
<div class="layout">
  <header class="header">
    <div class="header-logo"></div>
    <div class="language-selection">
      <button (click)="cambiarIdioma('es')">ES</button>
      <span class="separator">/</span>
      <button (click)="cambiarIdioma('en')">EN</button>
    </div>
  </header>

  <div class="main-container">
    <nav class="sidebar">
      <button routerLink="/items" class="sidebar-btn">Alumnos</button>
      <button routerLink="/configuracion" class="sidebar-btn">
        Configuración
      </button>
    </nav>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <nav class="bottom-bar">
    <button routerLink="/items">Alumnos</button>
    <button routerLink="/configuracion">Configuración</button>
  </nav>
</div>
} @else {
<router-outlet></router-outlet>
}
