<section class="login-container" *transloco="let t">
  <div class="login-card">
    <img src="/logo.png" [alt]="t('login.logoAlt')" class="login-logo" />

    <h1>{{ t('login.title') }}</h1>

    <button (click)="login()" [disabled]="loading">
      @if (loading) {
        <span class="spinner"></span>
        {{ t('login.loading') }}
      } @else {
        {{ t('login.submit') }}
      }
    </button>
  </div>
</section>
