<div *transloco="let t">
  <h1>{{ t('config.title') }}</h1>

  <div class="user-card">
    <img [src]="user.image" [alt]="t('config.profilePhotoAlt')" width="100" />

    <p>{{ t('config.name') }}: {{ user.name }}</p>
    <p>{{ t('config.email') }}: {{ user.email }}</p>
    <p>{{ t('config.role') }}: {{ user.role }}</p>
  </div>

  <button (click)="logout()">{{ t('config.logout') }}</button>
</div>
