<h2 mat-dialog-title>{{ 'config.appInfo' | transloco }}</h2>

<mat-dialog-content class="mat-typography">
  <div class="app-info-popup" style="text-align: center; padding: 10px">
    <img src="/logo.png" alt="Logo" width="80" style="margin-bottom: 15px" />
    <p><strong>Nombre:</strong> EducActiva</p>
    <p><strong>Versión:</strong> 1.0.0</p>
    <div
      style="margin-top: 15px; text-align: left; font-size: 0.9em; color: #555"
    >
      <p><strong>User Agent:</strong></p>
      <p
        style="
          word-break: break-all;
          background: #f5f5f5;
          padding: 8px;
          border-radius: 4px;
        "
      >
        {{ userAgent }}
      </p>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cerrar</button>
</mat-dialog-actions>
